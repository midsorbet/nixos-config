defaultThinkingLevel: xhigh
exa:
  enabled: true
  enableSearch: true
  enableResearcher: true
  enableWebsets: false
memory:
  backend: mnemopi
mnemopi:
  scoping: per-project-tagged
modelRoles:
  default: openai-codex/gpt-5.6-sol:high
  smol: openai-codex/gpt-5.6-luna:high
  slow: openai-codex/gpt-5.6-terra:max
  vision: openai-codex/gpt-5.6-sol:high
  plan: openai-codex/gpt-5.6-sol:high
  designer: openai-codex/gpt-5.6-sol:high
  commit: openai-codex/gpt-5.6-luna:medium
  tiny: openai-codex/gpt-5.6-luna:low
  task: openai-codex/gpt-5.6-luna:high
  advisor: anthropic/claude-opus-4-8:medium
modelProviderOrder:
  - anthropic
  - openai-codex
  - zai
  - cloudflare-ai-gateway
  - google-antigravity
  - opencode-zen
advisor:
  enabled: true
  subagents: false
  syncBacklog: off
  immuneTurns: 3
tier:
  openai: priority
task:
  eager: default
  maxConcurrency: 8
  maxRecursionDepth: 2
  softRequestBudgetNotice: true
  agentModelOverrides:
    reviewer: openai-codex/gpt-5.6-sol:high
providers:
  webSearch: auto
secrets:
  enabled: true
startup:
  setupWizard: false
symbolPreset: nerd
theme:
  dark: kanagawa-wave
  light: everforest-light-hard
