defaultThinkingLevel: xhigh
textVerbosity: low
exa:
  enabled: true
  enableSearch: true
  enableResearcher: true
  enableWebsets: false
astGrep:
  enabled: true
edit:
  enforceSeenLines: true
generate_image:
  enabled: true
memory:
  backend: mnemopi
autolearn:
  enabled: true
  autoContinue: false
  minToolCalls: 12
mnemopi:
  scoping: per-project-tagged
modelRoles:
  default: openai-codex/gpt-5.6-sol:max
  smol: openai-codex/gpt-5.6-luna:high
  slow: openai-codex/gpt-5.6-terra:max
  vision: openai-codex/gpt-5.6-sol:high
  plan: openai-codex/gpt-5.6-sol:high
  designer: openai-codex/gpt-5.6-sol:high
  commit: openai-codex/gpt-5.6-luna:medium
  tiny: openai-codex/gpt-5.6-luna:low
  task: openai-codex/gpt-5.6-sol:medium
  advisor: vibeproxy-anthropic/claude-opus-4-8:medium
modelProviderOrder:
  - vibeproxy-anthropic
  - vibeproxy-zai
  - openai-codex
  - cloudflare-ai-gateway
  - google-antigravity
  - opencode-zen
advisor:
  enabled: true
  subagents: false
  syncBacklog: off
  immuneTurns: 3
tier:
  openai: priority
task:
  eager: default
  prewalk: true
  maxConcurrency: 8
  maxRecursionDepth: 2
  softRequestBudgetNotice: true
  agentModelOverrides:
    reviewer: openai-codex/gpt-5.6-sol:high
providers:
  webSearch: auto
secrets:
  enabled: true
startup:
  setupWizard: false
symbolPreset: nerd
theme:
  dark: kanagawa-wave
  light: everforest-light-hard
