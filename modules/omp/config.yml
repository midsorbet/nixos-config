defaultThinkingLevel: xhigh
exa:
  enabled: true
  enableSearch: true
  enableResearcher: true
  enableWebsets: false
memory:
  backend: mnemopi
mnemopi:
  scoping: per-project-tagged
modelRoles:
  default: openai-codex/gpt-5.5
  smol: openai-codex/gpt-5.5:low
  advisor: opencode-zen/gpt-5.5:low
  designer: zai/glm-5.2
modelProviderOrder:
  - openai-codex
  - opencode-zen
  - cloudflare-ai-gateway
  - zai
  - google-antigravity
advisor:
  enabled: true
  subagents: false
  syncBacklog: off
  immuneTurns: 3
providers:
  webSearch: auto
secrets:
  enabled: true
startup:
  setupWizard: false
theme:
  dark: dark-terminal
  light: light
